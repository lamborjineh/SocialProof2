<!-- ══════════════════════════════════════════════════════════
     SNIPPET A — User dashboard: mindmap progress card
     Drop inside your existing dashboard card grid.
     JS fetches /api/mindmap/progress on page load.
════════════════════════════════════════════════════════════ -->

<!-- Inside dashboard HTML, in the stats/cards section: -->
<div class="mm-progress-card" id="mm-progress-card">
  <div class="mm-progress-header">
    <div class="mm-progress-title">🗺 Mindmap progress</div>
    <div class="mm-progress-count" id="mm-dash-count">—</div>
  </div>
  <div class="mm-progress-bar-wrap">
    <div class="mm-progress-bar-fill" id="mm-dash-bar" style="width:0%"></div>
  </div>
  <div class="mm-progress-last" id="mm-dash-last">Loading…</div>
</div>

<script>
/* Drop this in your dashboard.js init block */
(async function loadMindmapProgress() {
  try {
    const res  = await fetch('/api/mindmap/progress?map=main', { credentials: 'include' });
    if (!res.ok) return;
    const data = await res.json();
    const discovered = data.discovered || [];
    const total      = data.total || 30;
    const pct        = Math.round((discovered.length / total) * 100);

    document.getElementById('mm-dash-count').textContent = `${discovered.length} / ${total}`;
    document.getElementById('mm-dash-bar').style.width = pct + '%';

    if (discovered.length === 0) {
      document.getElementById('mm-dash-last').textContent = 'Start exploring → mindmap';
    } else if (discovered.length === total) {
      document.getElementById('mm-dash-last').innerHTML = '✦ <span>All nodes discovered!</span>';
    } else {
      // API should return last_node_label if available
      const lastLabel = data.last_node_label;
      document.getElementById('mm-dash-last').innerHTML = lastLabel
        ? `Last visited: <span>${lastLabel}</span>`
        : `${pct}% complete`;
    }
  } catch { /* card stays blank — non-critical */ }
})();
</script>
